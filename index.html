<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grid Visualizer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <canvas id="glCanvas"></canvas>
    <canvas id="overlayCanvas"></canvas>

    <!-- Download toast (browser only) -->

        <div class="download-toast-text">
            <span class="download-toast-title">Get the desktop app</span>
            <span id="downloadToastSub" class="download-toast-sub">Available for macOS &amp; Windows</span>
        </div>
        <div class="download-toast-buttons">
            <a class="download-toast-btn" id="downloadMac" href="https://github.com/Keshav-Madhav/grid-visualizer/releases/latest" target="_blank" rel="noopener">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.8-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83M13 3.5c.73-.83 1.94-1.46 2.94-1.5.13 1.17-.34 2.35-1.04 3.19-.69.85-1.83 1.51-2.95 1.42-.15-1.15.41-2.35 1.05-3.11z"/></svg>
                macOS
            </a>
            <a class="download-toast-btn" id="downloadWin" href="https://github.com/Keshav-Madhav/grid-visualizer/releases/latest" target="_blank" rel="noopener">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M3 12V6.75l8-1.25V12H3zm0 .5h8v6.5l-8-1.25V12.5zM11.5 5.35l9.5-1.6V12h-9.5V5.35zM11.5 12.5H21v7.75l-9.5-1.6V12.5z"/></svg>
                Windows
            </a>
        </div>
        <button id="downloadToastClose" class="download-toast-close" aria-label="Close">&times;</button>
    </div>

    <script src="globals.js"></script>
    <script src="webgl.js"></script>
    <script src="script.js"></script>
</body>
</html>
